version: '3.8'
services:
  app:
    build: .
    ports:
      - "2222:9090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/employee_db001
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=123
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: employee_db001
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: